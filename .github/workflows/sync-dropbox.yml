name: Sync Callan's Dropbox gallery (daily)

on:
  schedule:
    - cron: '0 12 * * *'   # every day at 12:00 UTC
  workflow_dispatch:        # ...or run it on demand from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull photos & videos from Dropbox
        env:
          DROPBOX_TOKEN: ${{ secrets.DROPBOX_TOKEN }}
          DROPBOX_FOLDER: ${{ vars.DROPBOX_FOLDER }}
        run: node sync-dropbox.js

      - name: Commit updated galleries
        run: |
          git config user.name  "callan-bot"
          git config user.email "callan-bot@users.noreply.github.com"
          git add photos.json videos.json
          git diff --staged --quiet || git commit -m "Daily Dropbox sync 🚚"
          git push
